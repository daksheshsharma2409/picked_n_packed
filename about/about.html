<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About - Picked & Packed</title>
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="font-main">
    <nav class="bg-white border-b border-[#EDE9E3] sticky top-0 z-50">
      <div
        class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between gap-4"
      >
        <div class="flex items-center gap-2 shrink-0">
          <button
            id="hamburger"
            class="md:hidden p-2 flex flex-col gap-1.5 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200"
            aria-label="Menu"
            aria-expanded="false"
          >
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
          </button>
          <a href="../index.html">
            <h1 class="font-main text-xl text-[#313030]">
              Picked &amp; Packed
            </h1>
          </a>
        </div>

        <ul class="hidden md:flex items-center gap-8 text-[15px]">
          <li>
            <a
              href="../index.html"
              class="text-[#998F82] font-medium border-b-2 border-transparent hover:border-[#998F82] transition-all duration-300 pb-0.5"
              >Home</a
            >
          </li>
          <li>
            <a
              href="../shop/shop.html"
              class="text-[#998F82] font-medium border-b-2 border-transparent hover:border-[#998F82] transition-all duration-300 pb-0.5"
              >Shop</a
            >
          </li>
          <li>
            <a
              href="#"
              class="text-[#313030] font-medium border-b-2 border-[#313030] pb-0.5"
              >About</a
            >
          </li>
        </ul>

        <div class="flex items-center gap-1 shrink-0">
          <a href="../cart/cart.html">
            <button
              class="p-2 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200 cursor-pointer text-[#787776]"
              aria-label="Cart"
            >
              <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            </button>
          </a>
          <a href="../wishlist/wishlist.html">
            <button
              class="p-2 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200 cursor-pointer text-[#787776]"
              aria-label="Wishlist"
            >
              <i data-lucide="heart" class="w-5 h-5"></i>
            </button>
          </a>
        </div>
      </div>

      <div
        id="mobile-menu"
        class="hidden md:hidden bg-white border-t border-[#EDE9E3]"
      >
        <ul class="flex flex-col px-6 py-4 gap-1 text-[15px]">
          <li>
            <a
              href="../index.html"
              class="flex items-center py-2.5 text-[#998F82] font-medium"
              >Home</a
            >
          </li>
          <li>
            <a
              href="../shop/shop.html"
              class="flex items-center py-2.5 text-[#998F82] font-medium border-b border-[#EDE9E3]"
              >Shop</a
            >
          </li>
          <li>
            <a
              href="about.html"
              class="flex items-center py-2.5 text-[#313030] font-medium border-b border-[#EDE9E3]"
              >About</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="bg-blue-400 h-200 w-screen"></div>
    <div class="bg-green-400 h-200 w-screen"></div>
    <div class="bg-yellow-400 h-200 w-screen"></div>

    <script src="about.js"></script>
    <script src="../navbar.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
