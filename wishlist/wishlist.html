<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist - Picked & Packed</title>
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body
    class="font-main bg-[#F6EFE4] text-[#2C1810] min-h-screen antialiased overflow-x-hidden pb-24 md:pb-0"
  >
    <nav
      class="hidden md:block bg-[#F6EFE4] border-b border-[#E2D5C4] sticky top-0 z-50"
    >
      <div
        class="max-w-7xl mx-auto px-8 h-[60px] flex items-center justify-between"
      >
        <a href="../index.html">
          <span
            class="font-display text-[26px] font-semibold text-[#2C1810] leading-none tracking-[-0.01em]"
          >
            Picked &amp; Packed
          </span>
        </a>

        <ul class="flex items-center gap-8 text-[13.5px] font-medium">
          <li>
            <a
              href="../index.html"
              class="text-[#8C7B6B] hover:text-[#2C1810] transition-colors pb-0.5 border-b border-transparent hover:border-[#2C1810]"
              >Home</a
            >
          </li>
          <li>
            <a
              href="../shop/shop.html"
              class="text-[#8C7B6B] hover:text-[#2C1810] transition-colors pb-0.5 border-b border-transparent hover:border-[#2C1810]"
              >Shop</a
            >
          </li>
          <li>
            <a
              href="../about/about.html"
              class="text-[#8C7B6B] hover:text-[#2C1810] transition-colors pb-0.5 border-b border-transparent hover:border-[#2C1810]"
              >About</a
            >
          </li>
        </ul>

        <div class="flex items-center gap-1">
          <a href="#">
            <button
              class="p-2.5 rounded-lg text-[#2C1810] border-b-2 border-[#B85C38] bg-[#EDE4D8] transition-all cursor-pointer"
            >
              <i data-lucide="heart" class="w-[18px] h-[18px]"></i>
            </button>
          </a>
          <a href="../cart/cart.html">
            <button
              class="flex items-center gap-2 ml-1 px-4 py-2 rounded-lg bg-[#2C1810] hover:bg-[#3D2515] text-[#F6EFE4] text-[13px] font-semibold transition-all cursor-pointer"
            >
              <i data-lucide="shopping-bag" class="w-[15px] h-[15px]"></i>
              Cart
            </button>
          </a>
        </div>
      </div>
    </nav>

    <footer class="border-t border-[#E2D5C4] py-8">
      <div
        class="max-w-7xl mx-auto px-5 md:px-8 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <span class="font-display text-[20px] font-semibold text-[#2C1810]"
          >Picked &amp; Packed</span
        >
        <p class="text-[12px] text-[#B0A090]">
          © 2026 Picked &amp; Packed. All rights reserved.
        </p>
        <div
          class="flex items-center gap-6 text-[12px] font-medium text-[#8C7B6B]"
        >
          <a
            href="../shop/shop.html"
            class="hover:text-[#2C1810] transition-colors"
            >Shop</a
          >
          <a
            href="../about/about.html"
            class="hover:text-[#2C1810] transition-colors"
            >About</a
          >
          <a
            href="../cart/cart.html"
            class="hover:text-[#2C1810] transition-colors"
            >Cart</a
          >
        </div>
      </div>
    </footer>

    <nav
      class="fixed bottom-3 left-1/2 -translate-x-1/2 z-50 flex items-center justify-around w-[90%] max-w-[400px] h-16 bg-white backdrop-blur-md border border-[#EDE9E3] rounded-2xl shadow-xl md:hidden px-2"
    >
      <a href="../index.html">
        <i
          data-lucide="house"
          class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"
        ></i>
      </a>

      <a href="../shop/shop.html">
        <i
          data-lucide="store"
          class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"
        ></i>
      </a>

      <a href="../cart/cart.html">
        <div
          class="relative -top-2 flex items-center justify-center w-14 h-14 bg-[#1a1a1a] rounded-full shadow-lg shadow-black/20 text-white cursor-pointer active:scale-95 transition-transform duration-200"
        >
          <i data-lucide="shopping-bag" class="w-6 h-6"></i>
        </div>
      </a>

      <a href="#">
        <i
          data-lucide="heart"
          class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"
        ></i>
      </a>

      <a href="../about/about.html">
        <i
          data-lucide="info"
          class="p-3 w-12 h-12 rounded-xl text-[#1a1a1a] bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"
        ></i>
      </a>
    </nav>

    <script src="wishlist.js"></script>
    <script src="../navbar.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
