<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Picked & Packed</title>
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="font-main bg-[#f5ead8]">
    <nav class="bg-white border-b border-[#EDE9E3] sticky top-0 hidden z-50 md:block">
      <div
        class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between gap-4"
      >
        <div class="flex items-center gap-2 shrink-0">
          <button
            class="md:hidden p-2 flex flex-col gap-1.5 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200"
          >
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
            <span
              class="block w-[22px] h-[2px] bg-[#313030] rounded-sm transition-all duration-300 origin-center"
            ></span>
          </button>
          <a href="../index.html">
            <h1 class="font-main text-xl text-[#313030]">
              Picked &amp; Packed
            </h1>
          </a>
        </div>

        <ul class="hidden md:flex items-center gap-8 text-[15px]">
          <li>
            <a
              href="../index.html"
              class="text-[#998F82] font-medium border-b-2 border-transparent hover:border-[#998F82] transition-all duration-300 pb-0.5"
              >Home</a
            >
          </li>
          <li>
            <a
              href="#"
              class="text-[#313030] font-medium border-b-2 border-[#313030] pb-0.5"
              >Shop</a
            >
          </li>
          <li>
            <a
              href="../about/about.html"
              class="text-[#998F82] font-medium border-b-2 border-transparent hover:border-[#998F82] transition-all duration-300 pb-0.5"
              >About</a
            >
          </li>
        </ul>

        <div class="flex items-center gap-1 shrink-0">
          <a href="../cart/cart.html">
            <button
              class="p-2 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200 cursor-pointer text-[#787776]"
              aria-label="Cart"
            >
              <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            </button>
          </a>
          <a href="../wishlist/wishlist.html">
            <button
              class="p-2 rounded-lg hover:bg-[#F5F1EC] transition-colors duration-200 cursor-pointer text-[#787776]"
              aria-label="Wishlist"
            >
              <i data-lucide="heart" class="w-5 h-5"></i>
            </button>
          </a>
        </div>
      </div>

      
    </nav>
    
  <nav class="fixed bottom-3 left-1/2 -translate-x-1/2 z-50 flex items-center justify-around w-[90%] max-w-[400px] h-16 bg-white backdrop-blur-md border border-[#EDE9E3] rounded-2xl shadow-xl md:hidden px-2">
    <a href="../index.html">
      <i data-lucide="house" class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"></i>
    </a>
    
    <a href="#">
      <i data-lucide="search" class="p-3 w-12 h-12 rounded-xl text-[#1a1a1a] bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"></i>
    </a>
    
    <a href="../cart/cart.html">
      <div class="relative -top-2 flex items-center justify-center w-14 h-14 bg-[#1a1a1a] rounded-full shadow-lg shadow-black/20 text-white cursor-pointer active:scale-95 transition-transform duration-200">
        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
      </div>
    </a>
    
    <a href="../wishlist/wishlist.html">
      <i data-lucide="heart" class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"></i>
    </a>
    
    <a href="../about/about.html">
      <i data-lucide="info" class="p-3 w-12 h-12 rounded-xl text-[#787776] hover:text-[#1a1a1a] hover:bg-[#F5F1EC] transition-all duration-300 cursor-pointer active:scale-90"></i>
    </a>

  </nav>

    <div
      id="shop-container"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 p-10"
    >
        </div>
      </div>
    </div>
    <div id="getToTop" class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-[#3a2e22] text-white flex items-center justify-center cursor-pointer shadow-lg hover:bg-[#5a4838] hover:scale-110 transition-all z-50 opacity-0 md:bottom-6">
      <i data-lucide="arrow-up" class="w-[21px] h-[21px]"></i>
    </div>


    <!-- <script src="../api/api.js"></script> -->
    <script src="render.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
